    <script>
      // problem 1 variables
      var a = Math.floor(Math.random() * 5) + 1;
      var b = Math.floor(Math.random() * 5) + 1;

      var hDeterminator = Math.floor(Math.random() * 2);
      var jDeterminator = Math.floor(Math.random() * 2);

      if (fDeterminator === 0) {

      //   end two variables

      //   end problem 3 variables
      // begin problem 4 variables
      var n = Math.floor(Math.random() * 5) + 1;

      // end problem 4 variables
      //   begin problem 5 variables
      var p = Math.floor(Math.random() * 10) + 5;
      var q = Math.floor(Math.random() * 10) + 5;
      var r = Math.floor(Math.random() * 10) + 5;
      var s = q - 1;
      var t = Math.floor(Math.random() * 10) + 5;
      var u = s - 1;
      var v = Math.floor(Math.random() * 10) + 5;
      //   end problem 5 variables
      // begin problem 6 variables
      var x = Math.floor(Math.random() * 10) + 5;
      var y = Math.floor(Math.random() * 10) + 5;
      var z = Math.floor(Math.random() * 10) + 5;
      var aa = y - 1;
      var bb = Math.floor(Math.random() * 10) + 5;
      var cc = aa - 1;
      var dd = Math.floor(Math.random() * 10) + 5;
      var xDeterminator = Math.floor(Math.random() * 2);
      if (xDeterminator === 0) {
        x *= -1;
      }
      //   end problem 6 variables
      //   begin problem 7 variables
      var ee = Math.floor(Math.random() * 5) + 1;
      var ff = Math.floor(Math.random() * 5) + 1;
      var gg = Math.floor(Math.random() * 5) + 1;
      //   end problem 7 variables
      //   begin problem 8 variables
      var hh = Math.floor(Math.random() * 10) + 5;
      var ii = Math.floor(Math.random() * 10) + 5;
      // end problem 8 variables
      //   begin problem 9 variables
      var jj = Math.floor(Math.random() * 10) + 10;
      var kk = Math.floor(Math.random() * 10) + 2;
      //   end problem 9 variables
      //   begin problem 10 variables
      var ll = (Math.floor(Math.random() * 10) + 4) * 100;
      var mm = (Math.floor(Math.random() * 5) + 2) * 5;
      //   end problem 10 variables
      let problemOneFunc = (a, b, c, d, e) => {
        return `Use the Remainder Theorem to find the remainder when P(x) = ${a}x<sup>3</sup> + ${b}x<sup>2</sup> + ${c}x + ${d} is divided by (x - ${e})`;
      };
      let solutionOneFunc = (a, b, c, d, e) => {
        var solution = a * e * e * e + b * e * e + c * e + d;
        return solution;
      };
      //   end problem one and two functions
      //   start problem 3 and 4 functions
      let problemThreeFunc = (l, m) => {
        var problemQuestion = `Determine if (x - ${m}) is a factor of (x<sup>4</sup> - ${l * l}).`;
        return problemQuestion;
      };
      let solutionThreeFunc = (l, m) => {
        var remainder = m * m * m * m - l * l;
        if (remainder === 0) {
          return `Yes, (x - ${m}), is a factor of x<sup>4</sup> - ${l * l}.`;
        } else {
          return `No, (x - ${m}), is not a factor of x<sup>4</sup> - ${l * l}.`;
        }
      };
      // end problem 3 and 4 functions
      //   begin problem 5 and 6 functions
      let problemFiveFunc = (p, q, r, s, t, u, v) => {
        return `Determine the end behavior of the function, f(x) = ${p}x<sup>${q}</sup> + ${r}x<sup>${s}</sup> + ${t}<sup>${u}</sup> + ${v}.`;
      };
      let solutionFiveFunc = (p, q) => {
        if (p > 0) {
          if (q % 2 === 0) {
            return `As x &rarr; + &infin;, f(x) &rarr; + &infin;, and as x &rarr; &minus; &infin;, f(x) &rarr; + &infin;.`;
          } else {
            return `As x &rarr; + &infin;, f(x) &rarr; + &infin;, and as x &rarr; &minus; &infin;, f(x) &rarr; &minus; &infin;. `;
          }
        } else {
          if (q % 2 === 0) {
            return `As <var>x</var> &rarr; &infin;, f(x) &rarr; &minus; &infin;, and as <var>x</var> &rarr; &minus; &infin;, f(x) &rarr; &minus; &infin;.`;
          } else {
            return `As <var>x</var> &rarr; &infin;, f(x) &rarr; &minus; &infin; and as <var>x</var> &rarr; &minus; &infin;, f(x) &rarr; + &infin;.`;
          }
        }
      };
      //   end 5 and 6 functions
      // begin functions for 7
      let problemSevenFunc = (ee, ff, gg) => {
        return `The function <var>f</var> is defined by <var>f(x)</var> = ${ee}x - ${ff}. What is the value of <var>f(${gg})</var>?`;
      };
      let solutionSevenFunc = (ee, ff, gg) => {
        var solution = ee * gg - ff;
        return solution;
      };
      //   begin functions for 8
      let problemEightFunc = (hh, ii) => {
        return `If ${hh}<var>p</var> = ${hh * ii}, what is the value of <var>p</var>?`;
      };
      //   end functions for 8
      //   begin functions for 9
      let problemNineFunc = (jj, kk) => {
        return `(<var>q</var> + ${jj})(<var>q</var> &minus; ${jj}) &minus; ${kk} = ${kk}, what is a solution to the given equation?`;
      };
      let solutionNineFunc = (jj) => {
        return `<var>q</var> = ${jj} or <var>q</var> = &minus;${jj}`;
      };
      // end functions for 9
      //   begin functions for 10
      let problemTenFunc = (ll, mm) => {
        return `What is ${mm}% of ${ll}?`;
      };
      let solutionTenFunc = (ll, mm) => {
        var solution = (mm / 100) * ll;
        return solution;
      };
      //   end problem 10 functions
      //   problem 1
      var problemOne = document.querySelectorAll(".problem p")[0];
      problemOne.innerHTML = "1) " + problemOneFunc(a, b, c, d, e);
      var solutionOne = document.querySelectorAll("ol li")[0];
      solutionOne.textContent = solutionOneFunc(a, b, c, d, e);
      //   end problem 1

      solutionTwo.textContent = solutionOneFunc(f, g, h, j, k);
      // end problem 2
      //   begin problem 3

      problemThree.innerHTML = "3) " + problemThreeFunc(l, m);
      var solutionThree = document.querySelectorAll("ol li")[2];
      solutionThree.innerHTML = solutionThreeFunc(l, m);
      // end problem 3
      //   begin problem 4

      problemFour.innerHTML = "4) " + problemThreeFunc(n, o);
      var solutionFour = document.querySelectorAll("ol li")[3];
      solutionFour.innerHTML = solutionThreeFunc(n, o);
      //   begin problem 5
      var problemFive = document.querySelectorAll(".problem p")[4];
      problemFive.innerHTML = "5) " + problemFiveFunc(p, q, r, s, t, u, v);
      var solutionFive = document.querySelectorAll("ol li")[4];
      solutionFive.innerHTML = solutionFiveFunc(p, q);
      //   begin problem 6
      var problemSix = document.querySelectorAll(".problem p")[5];
      problemSix.innerHTML = "6) " + problemFiveFunc(x, y, z, aa, bb, cc, dd);
      var solutionSix = document.querySelectorAll("ol li")[5];
      solutionSix.innerHTML = solutionFiveFunc(x, y);
      //   begin problem 7
      var problemSeven = document.querySelectorAll(".problem p")[6];
      problemSeven.innerHTML = "7) " + problemSevenFunc(ee, ff, gg);
      var solutionSeven = document.querySelectorAll("ol li")[6];
      solutionSeven.innerHTML = solutionSevenFunc(ee, ff, gg);
      //   begin problem 8
      var problemEight = document.querySelectorAll(".problem p")[7];
      problemEight.innerHTML = "8) " + problemEightFunc(hh, ii);
      var solutionEight = document.querySelectorAll("ol li")[7];
      solutionEight.innerHTML = ii;
      // begin problem 9
      var problemNine = document.querySelectorAll(".problem p")[8];
      problemNine.innerHTML = "9) " + problemNineFunc(jj, kk);
      var solutionNine = document.querySelectorAll("ol li")[8];
      solutionNine.innerHTML = solutionNineFunc(jj);
      //   begin problem 10
      var problemTen = document.querySelectorAll(".problem p")[9];
      problemTen.innerHTML = "10) " + problemTenFunc(ll, mm);
      var solutionTen = document.querySelectorAll("ol li")[9];
      solutionTen.innerHTML = solutionTenFunc(ll, mm);
      // loop through headings
      for (var i = 0; i < 33; i++) {
        var problemHeading = document.querySelectorAll(".problem h2")[i];
